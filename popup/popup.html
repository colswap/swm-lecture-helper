<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1 class="title">SWM Lecture</h1>
    <div id="headerStats" class="header-stats">--</div>
  </header>

  <div class="search">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="제목·멘토·설명 검색" autofocus>
  </div>

  <div class="filters">
    <input type="date" id="filterDate" title="날짜">
    <select id="filterStatus">
      <option value="">전체 상태</option>
      <option value="A" selected>접수중</option>
      <option value="C">마감</option>
    </select>
    <select id="filterCategory">
      <option value="">전체 분류</option>
      <option value="MRC020">멘토 특강</option>
      <option value="MRC010">자유 멘토링</option>
    </select>
    <select id="filterLocation">
      <option value="">전체 장소</option>
      <option value="online">비대면</option>
      <option value="offline">대면</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="search">검색</button>
    <button class="tab" data-tab="favorites">즐겨찾기</button>
    <button class="tab" data-tab="applied">내 신청</button>
    <div class="tabs-count" id="resultCount"></div>
  </div>

  <div id="results" class="results"></div>

  <div class="footer">
    <button id="syncBtn" class="btn btn-primary" title="접수중 강연 (장소 포함) 동기화">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-6.219-8.56"/><polyline points="21 4 21 10 15 10"/></svg>
      접수중 동기화
    </button>
    <button id="syncAllBtn" class="btn btn-secondary" title="마감된 과거 강연까지 포함 (느림)">마감 포함</button>
  </div>

  <script src="../lib/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
