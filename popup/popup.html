<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1 class="title">SWM Lecture</h1>
    <div class="header-right">
      <button id="openTimetableBtn" class="header-btn" title="시간표 풀탭으로 열기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        시간표
      </button>
      <div class="menu-wrap">
        <button id="popupMenuBtn" class="header-btn menu-btn-icon" title="메뉴">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
        <div id="popupMenuDropdown" class="menu-dropdown" style="display:none">
          <button class="menu-item" data-action="darkmode" id="popupMenuDark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span id="popupDarkModeLabel">다크 모드</span>
          </button>
          <div class="menu-sep"></div>
          <button class="menu-item menu-item-danger" data-action="reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            데이터 초기화
          </button>
        </div>
      </div>
      <div id="headerStats" class="header-stats">--</div>
    </div>
  </header>

  <div class="search">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="제목·멘토·설명 검색" autofocus>
  </div>

  <div class="filters">
    <input type="date" id="filterDate" title="날짜">
    <select id="filterStatus">
      <option value="">전체 상태</option>
      <option value="A" selected>접수중</option>
      <option value="C">마감</option>
    </select>
    <select id="filterCategory">
      <option value="">전체 분류</option>
      <option value="MRC020">멘토 특강</option>
      <option value="MRC010">자유 멘토링</option>
    </select>
    <select id="filterLocation">
      <option value="">전체 장소</option>
      <option value="online">비대면</option>
      <option value="offline">대면</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="search">검색</button>
    <button class="tab" data-tab="favorites">즐겨찾기</button>
    <button class="tab" data-tab="applied">내 신청</button>
    <div class="tabs-count" id="resultCount"></div>
  </div>

  <div id="results" class="results"></div>

  <div class="footer">
    <button id="syncBtn" class="btn btn-primary" title="접수중 강연 (장소 포함) 동기화">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-6.219-8.56"/><polyline points="21 4 21 10 15 10"/></svg>
      접수중 동기화
    </button>
    <button id="syncAllBtn" class="btn btn-secondary" title="마감된 과거 강연까지 포함 (느림)">마감 포함</button>
  </div>

  <script src="../lib/theme.js"></script>
  <script src="../lib/menu_common.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="../lib/time_utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
