<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../lib/tokens.css">
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="../lib/coachmark.css">
</head>
<body>
  <header class="header">
    <h1 class="title">SWM Lecture <span class="badge-version" id="versionBadge"></span></h1>
    <div class="header-right">
      <button id="openTimetableBtn" class="header-btn" title="전체화면 시간표로 열기" aria-label="전체화면">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        전체화면
      </button>
      <div class="menu-wrap">
        <button id="popupMenuBtn" class="header-btn menu-btn-icon" title="메뉴" aria-label="메뉴 열기" aria-haspopup="menu" aria-expanded="false" aria-controls="popupMenuDropdown">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
        <div id="popupMenuDropdown" class="menu-dropdown" role="menu" style="display:none">
          <div class="menu-group-label">정보</div>
          <button class="menu-item" data-action="darkmode" id="popupMenuDark" title="클릭할 때마다 시스템 → 라이트 → 다크 → ... 순환">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <span id="popupDarkModeLabel">테마</span>
          </button>
          <button class="menu-item" data-action="palette" id="popupMenuPalette" title="컬러 팔레트 테마 선택">
            🎨 <span>팔레트 테마</span>
          </button>
          <button class="menu-item" data-action="replay-tour" id="popupMenuReplayTour">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            💡 설명 다시 보기
          </button>
          <div class="menu-divider"></div>
          <button class="menu-item menu-item-danger" data-action="reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            데이터 초기화
          </button>
        </div>
      </div>
      <div id="headerStats" class="header-stats">--</div>
    </div>
  </header>

  <div class="search">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="내일 비대면 접수중  |  김멘토 AI 특강" autofocus>
  </div>

  <div class="query-chip-row">
    <div class="query-chips" id="queryChips" role="list" aria-label="검색 토큰"></div>
    <button class="query-help" id="queryHelp" aria-label="검색 문법 도움말" aria-expanded="false" aria-controls="queryHelpPopover" type="button">?</button>
    <div class="query-help-popover" id="queryHelpPopover" hidden role="region" aria-label="검색 문법">
      <h4>💬 자연어로 검색</h4>
      <p class="help-label">예시</p>
      <ul class="help-examples">
        <li><code>내일 비대면 접수중</code></li>
        <li><code>김멘토 AI 특강</code></li>
        <li><code>이번주 대면 백엔드</code></li>
        <li><code>오후 7시 이후 멘토링</code></li>
      </ul>
      <p class="hint">고급 (선택): <code>@멘토</code> <code>#카테고리</code> <code>-제외</code></p>
    </div>
  </div>

  <details class="collapsible advanced-search" id="advancedSearchPanel">
    <summary class="collapsible-trigger">상세 검색</summary>
    <div class="collapsible-content">
      <div class="filters">
        <input type="date" id="filterDate" title="날짜">
        <select id="filterStatus">
          <option value="">전체 상태</option>
          <option value="A" selected>접수중</option>
          <option value="C">마감</option>
        </select>
        <select id="filterCategory">
          <option value="">전체 분류</option>
          <option value="MRC020">멘토 특강</option>
          <option value="MRC010">자유 멘토링</option>
        </select>
        <select id="filterLocation">
          <option value="">전체 장소</option>
          <option value="online">비대면</option>
          <option value="offline">대면</option>
        </select>
      </div>
      <div class="filters filters-topic">
        <select id="filterDerivedCat" title="주제 (자동 분류)">
          <option value="">전체 주제</option>
        </select>
      </div>
    </div>
  </details>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="search" role="tab" aria-selected="true">검색</button>
    <button class="tab" data-tab="favorites" role="tab" aria-selected="false">즐겨찾기</button>
    <button class="tab" data-tab="applied" role="tab" aria-selected="false">내 신청</button>
    <div class="tabs-count" id="resultCount" aria-live="polite" aria-atomic="true"></div>
  </div>

  <div id="results" class="results"></div>

  <div class="footer">
    <button id="syncBtn" class="btn btn-primary" title="접수중 강연 (장소 포함) 동기화">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-6.219-8.56"/><polyline points="21 4 21 10 15 10"/></svg>
      접수중 동기화
    </button>
    <button id="syncAllBtn" class="btn btn-secondary" title="마감된 과거 강연까지 포함 (느림)">마감 포함</button>
  </div>

  <div id="popoverToast" class="popover-toast" role="status" aria-live="polite" style="display:none">
    <span class="popover-toast-text" id="popoverToastText"></span>
    <button type="button" class="popover-toast-close" id="popoverToastClose" aria-label="토스트 닫기">✕</button>
  </div>

  <div id="themeModalBackdrop" class="theme-modal-backdrop"></div>
  <div id="themeModal" class="theme-modal" role="dialog" aria-modal="true" aria-labelledby="themeModalTitle">
    <header class="theme-modal-header">
      <h2 class="theme-modal-title" id="themeModalTitle">🎨 팔레트 테마 선택</h2>
      <button id="themeModalClose" class="theme-modal-close" title="닫기" aria-label="닫기">✕</button>
    </header>
    <div class="theme-modal-body" id="themeModalBody"></div>
  </div>

  <script src="../lib/storage.js"></script>
  <script src="../lib/theme.js"></script>
  <script src="../lib/themes.js"></script>
  <script src="../lib/menu_common.js"></script>
  <script src="../lib/classifier.js"></script>
  <script src="../lib/time_utils.js"></script>
  <script src="../lib/query_parser.js"></script>
  <script src="../lib/coachmark.js"></script>
  <script src="../lib/modal.js"></script>
  <script src="popup.js"></script>
</body>
</html>
