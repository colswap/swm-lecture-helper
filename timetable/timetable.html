<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SWM Lecture — 시간표</title>
  <link rel="stylesheet" href="timetable.css">
</head>
<body>

<aside class="sidebar">
  <header class="header">
    <h1 class="title">SWM Lecture</h1>
    <div id="headerStats" class="header-stats">--</div>
  </header>

  <div class="search">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="searchInput" placeholder="제목·멘토·설명 검색" autofocus>
  </div>

  <div class="filters filters-range">
    <input type="date" id="filterDateStart" title="시작일">
    <span class="range-sep">~</span>
    <input type="date" id="filterDateEnd" title="종료일">
    <button id="clearDateRange" class="range-clear" title="날짜 초기화">✕</button>
  </div>
  <div class="filters">
    <select id="filterStatus">
      <option value="">전체 상태</option>
      <option value="A" selected>접수중</option>
      <option value="C">마감</option>
    </select>
    <select id="filterCategory">
      <option value="">전체 분류</option>
      <option value="MRC020">멘토 특강</option>
      <option value="MRC010">자유 멘토링</option>
    </select>
    <select id="filterLocation">
      <option value="">전체 장소</option>
      <option value="online">비대면</option>
      <option value="offline">대면</option>
    </select>
  </div>

  <div class="tt-toggles">
    <label><input type="checkbox" id="thisWeekOnly" checked> 이번 주</label>
    <label><input type="checkbox" id="onlyFreeSlot"> 빈 시간만</label>
    <button id="advancedToggle" class="advanced-btn">상세검색 (시간대 선택)</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="search">검색</button>
    <button class="tab" data-tab="favorites">즐겨찾기</button>
    <button class="tab" data-tab="applied">내 신청</button>
    <div class="tabs-count" id="resultCount"></div>
  </div>

  <div id="results" class="results"></div>

  <div class="footer">
    <button id="syncBtn" class="btn btn-primary" title="접수중 강연 (장소 포함) 동기화">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 11-6.219-8.56"/><polyline points="21 4 21 10 15 10"/></svg>
      접수중 동기화
    </button>
    <button id="syncAllBtn" class="btn btn-secondary" title="마감된 과거 강연까지 포함 (느림)">마감 포함</button>
  </div>
</aside>

<main class="main">
  <header class="main-header">
    <div class="nav-group">
      <button id="prevWeek" class="nav-btn" title="이전 주 (←)">◀</button>
      <button id="todayBtn" class="nav-btn today">오늘</button>
      <button id="nextWeek" class="nav-btn" title="다음 주 (→)">▶</button>
      <span id="weekLabel" class="week-label">--</span>
    </div>
    <div class="right-group">
      <div id="hoverPreviewInfo" class="preview-info"></div>
      <label class="toggle-switch" title="즐겨찾기 강연을 그리드에 반투명으로 표시">
        <input type="checkbox" id="showFavsOnGrid" checked>
        <span class="slider"></span>
        <span class="toggle-label">즐겨찾기 표시</span>
      </label>
      <div class="menu-wrap">
        <button id="menuBtn" class="menu-btn" title="메뉴">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
        <div id="menuDropdown" class="menu-dropdown" style="display:none">
          <button class="menu-item" data-action="ical">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            iCal 내보내기
          </button>
          <button class="menu-item" data-action="print">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            인쇄 · PDF
          </button>
          <button class="menu-item" data-action="notify">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            알림 설정
          </button>
          <div class="menu-sep"></div>
          <button class="menu-item menu-item-danger" data-action="reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            데이터 초기화
          </button>
        </div>
      </div>
    </div>
  </header>

  <div id="slotBar" class="slot-bar" style="display:none">
    <span class="slot-bar-label">시간대 검색:</span>
    <div id="slotChips" class="slot-chips"></div>
    <div class="slot-bar-actions">
      <button class="info-btn" data-tooltip="그리드에서 드래그하면 시간 범위 선택&#10;요일 헤더 클릭하면 그 요일 종일 선택&#10;선택된 노란 블록 우클릭으로 개별 제거">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
      <button id="slotFreeBtn" class="btn btn-secondary" title="이번 주 빈 시간(신청 강연 제외) 전체 선택">내 빈 시간 전체</button>
      <button id="slotClearBtn" class="btn btn-secondary">전체 해제</button>
    </div>
  </div>

  <div class="grid-wrapper">
    <div class="day-headers" id="dayHeaders"></div>
    <div class="grid-body" id="gridBody"></div>
  </div>
</main>

<div id="popoverBackdrop" class="popover-backdrop"></div>
<div id="popover" class="popover">
  <header class="popover-header">
    <span id="popoverCat" class="cat"></span>
    <div id="popoverTitle" class="popover-title"></div>
    <button id="popoverClose" class="popover-close" title="닫기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </header>
  <div id="popoverMeta" class="popover-meta"></div>
  <div id="popoverDesc" class="popover-desc"></div>
  <div class="popover-actions">
    <button id="popoverFav" class="btn btn-fav" title="즐겨찾기 토글">
      <svg id="popoverFavIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span id="popoverFavLabel">즐겨찾기</span>
    </button>
    <button id="popoverOpen" class="btn btn-apply">
      신청하러 가기
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
</div>

<script src="../lib/storage.js"></script>
<script src="../lib/time_utils.js"></script>
<script src="menu.js"></script>
<script src="timetable.js"></script>
</body>
</html>
